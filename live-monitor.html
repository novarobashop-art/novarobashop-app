<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔴 LIVE Monitor — Novarobashop</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, query, where, orderBy, onSnapshot, limit, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg = {
    apiKey:"AIzaSyBjjDYmnGoAmdeczSa6nY-pOM7lJ-qjzjY",
    authDomain:"novarobashop-e2a61.firebaseapp.com",
    projectId:"novarobashop-e2a61",
    storageBucket:"novarobashop-e2a61.firebasestorage.app",
    messagingSenderId:"262847590425",
    appId:"1:262847590425:web:16e3f34e21a2661d0dfa88"
  };
  const app=initializeApp(cfg), auth=getAuth(app), db=getFirestore(app);
  window._db=db; window._auth=auth;
  window._signIn=signInWithEmailAndPassword;
  window._signOut=signOut;
  window._fb={ collection, query, where, orderBy, onSnapshot, limit, addDoc };

  onAuthStateChanged(auth, user => {
    if(user){ 
      document.getElementById('ls').style.display='none';
      document.getElementById('ms').style.display='flex';
      window._uid=user.uid;
      startMonitor();
    } else {
      document.getElementById('ls').style.display='flex';
      document.getElementById('ms').style.display='none';
      _unsubs.forEach(u=>{try{u();}catch(e){}});
      _unsubs=[];
    }
  });
</script>
<style>
:root{--ink:#0a0b0f;--ink2:#0f1117;--surface:rgba(15,17,23,0.96);--surface2:rgba(19,22,30,0.80);--amber:#d4922a;--amber2:#b87820;--amber3:#e8aa46;--teal:#22b5a0;--blue:#5b8dee;--rose:#d84060;--emerald:#28b86a;--orange:#e07030;--violet:#8b68e8;--txt:#d8dde8;--txt2:#7888a0;--txt3:#4a5568;--brd:rgba(255,255,255,0.06);--brd2:rgba(255,255,255,0.03);--brd3:rgba(255,255,255,0.10);--r-xs:6px;--r-sm:10px;--r-md:14px;--r-lg:18px;--r-pill:999px;--gray:var(--txt3);--gray2:var(--txt2);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--ink);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.15);border-radius:4px;}

#ls{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;
  background:linear-gradient(160deg,#0d1018,var(--ink));}
.lbox{background:var(--surface);border:1px solid var(--brd3);border-radius:var(--r-lg);padding:36px 30px;width:360px;box-shadow:0 24px 64px rgba(0,0,0,0.55);position:relative;overflow:hidden;}
.lbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.5),transparent);}
.llogo{font-family:'Barlow',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;color:var(--txt);}
.llogo span{color:var(--amber);}
.lsub{text-align:center;font-size:11px;color:var(--txt3);margin-bottom:24px;text-transform:uppercase;letter-spacing:2px;font-weight:500;}
.linp{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid var(--brd);border-radius:var(--r-sm);padding:12px 14px;color:var(--txt);font-size:14px;font-family:'Nunito';outline:none;margin-bottom:12px;transition:border-color 0.2s,box-shadow 0.2s;}
.linp:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(20,184,166,0.1);}
.lbtn{width:100%;background:linear-gradient(135deg,var(--teal),var(--teal2,#1a9080));border:none;border-radius:var(--r-sm);padding:13px;color:#001a16;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito';box-shadow:0 4px 14px rgba(34,181,160,0.2);transition:all 0.2s;}
.lbtn:hover{opacity:0.9;transform:translateY(-1px);}
.lerr{color:#fda4af;font-size:13px;text-align:center;margin-top:8px;min-height:18px;}

#ms{display:none;flex-direction:column;height:100vh;}
.tb{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;height:52px;background:rgba(5,6,8,0.95);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(20px);flex-shrink:0;gap:12px;}
.tb-logo{font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px;color:var(--txt);}
.live-pill{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#dc2626,#9f1010);border-radius:var(--r-pill);padding:5px 14px;font-size:12px;font-weight:800;letter-spacing:1px;box-shadow:0 2px 10px rgba(220,38,38,0.35);animation:glow 2s ease-in-out infinite;flex-shrink:0;}
.ldot{width:8px;height:8px;border-radius:50%;background:white;animation:blink 1.1s infinite;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.stats{display:flex;gap:8px;align-items:center;}
.sp{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border:1px solid var(--brd);border-radius:var(--r-pill);padding:5px 13px;}
.sp-n{font-size:18px;font-weight:800;line-height:1;}
.sp-l{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;}
.tb-search{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border:1.5px solid var(--brd);border-radius:var(--r-pill);padding:0 14px;flex:1;max-width:270px;transition:border-color 0.2s;}

.fb-noreg{background:rgba(216,64,96,0.12)!important;color:#ff9aad!important;border-color:rgba(216,64,96,0.25)!important;}
.sdd{margin-left:auto;background:rgba(255,255,255,0.05);border:1px solid var(--brd);border-radius:var(--r-xs);padding:4px 10px;color:var(--txt);font-size:11px;font-family:'Nunito';outline:none;cursor:pointer;}

.main{flex:1;display:grid;grid-template-columns:1fr 320px;overflow:hidden;min-height:0;}
.col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--brd);}

</style>

<body>

<!-- LOGIN -->
<div id="ls">

      </div>
    </div>

</div>

<!-- TOAST -->

<script>
const RAILWAY = 'https://novarobashop-server-production.up.railway.app';
const PUSH_WORKER_URL_LM = 'https://novarobashop-push.novarobashop.workers.dev';

// Push an alle Kunden senden (für Live-Benachrichtigungen)
async function _sendLivePushToAll(title, body) {
  try {
    const {collection:col, getDocs, query, where} = window._fb;
    const db = window._db;
    const snap = await getDocs(query(col(db,'users'), where('role','==','kupac')));
    const tokens = [];
    snap.forEach(d => { const t = d.data().fcmToken; if(t) tokens.push(t); });
    if (!tokens.length) return;
    await fetch(PUSH_WORKER_URL_LM, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        tokens,
        title,
        body,
        icon: '/novarobashop-app/icon-192.png',
        badge: '/novarobashop-app/icon-192.png',
        tag: 'live',
        data: { tab: 'notif', url: 'https://novarobashop-art.github.io/novarobashop-app/novarobashop.html' }
      })
    });
  } catch(e) { console.log('Live push error:', e.message); }
}
let _kupci=[], _racuni=[], _chat=[], _chatCnt=0, _unsubs=[];
let _seenNoreg=new Set(); // tiktokIds die als rot gesehen wurden
let _isLive=false, _liveStartedAt=null, _liveChatUnsub=null, _liveKupciUnsub=null;
let _msgCount={};    // { tiktokId: count } — poruke po korisniku u ovom liveu
let _vipNotified=new Set(); // tiktokIds kojima je već odsviran VIP ton
const VIP_THRESHOLD=5;  // koliko poruka = VIP
let _currentUser=null;

// ── AUTH ──
async function doLogin(){
  const e=document.getElementById('le').value.trim(), p=document.getElementById('lp').value;
  document.getElementById('lerr').textContent='';
  try{ await window._signIn(window._auth,e,p); }
  catch(err){ document.getElementById('lerr').textContent='❌ Pogrešan email ili lozinka.'; }
}
async function doLogout(){ await window._signOut(window._auth); }
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('ls').style.display!=='none') doLogin();
});

// ── FIRESTORE STATUS ──
function _fsOk(msg){
  const bar=document.getElementById('fs-bar'),last=document.getElementById('fs-last');
  if(bar){bar.className='fs-bar ok';document.getElementById('fs-txt').textContent='Firestore: '+(msg||'povezan');}
  if(last){last.textContent='Zadnji: '+new Date().toLocaleTimeString('sr-Latn',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
}
function _fsErr(msg){
  const bar=document.getElementById('fs-bar');
  if(bar){bar.className='fs-bar err';document.getElementById('fs-txt').textContent='Firestore: '+(msg||'greška');}
}
function _showToast(msg,dur=4000,color=''){
  const t=document.getElementById('m-toast');
  if(!t)return;
  t.textContent=msg;
  t.className='m-toast'+(color?' '+color:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── START MONITOR ──
function startMonitor(){
  const {collection:col,query:q,where:wh,onSnapshot:snap}=window._fb;
  const db=window._db, uid=window._uid;

  // Admin user data
  snap(q(col(db,'users'),wh('__name__','==',uid)),s=>{
    s.forEach(d=>{_currentUser={uid,id:uid,...d.data()};});
  });

  // Kupci (needed for chat name lookup)
  _unsubs.push(snap(
    q(col(db,'users'),wh('role','==','kupac')),
    s=>{ _kupci=[]; s.forEach(d=>_kupci.push({id:d.id,...d.data()})); _fsOk(); },
    e=>{ _fsErr('Kupci: '+e.message); }
  ));

  // Racuni (needed for auto invoice send)
  _unsubs.push(snap(
    q(col(db,'racuni'),wh('adminId','==',uid)),
    s=>{ _racuni=[]; s.forEach(d=>_racuni.push({id:d.id,...d.data()})); _fsOk(); },
    e=>{ _fsErr('Računi: '+e.message); }
  ));
}

// VIP Score računanje iz live_engagement
let _vipScores={};   // { tiktokId: totalPoints }
let _vipBadges=new Set(); // tiktokIds koji su dostigli VIP
let _engUnsub=null;

function startEngagementListener(){
  const {collection:col,query:q,where:wh,onSnapshot:snap}=window._fb;
  const db=window._db, uid=window._uid;
  _vipScores={};
  _vipBadges=new Set();
  if(_engUnsub){_engUnsub();_engUnsub=null;}
  const liveStart=_liveStartedAt||new Date();
  const filterFrom=new Date(liveStart.getTime()-3000);
  _engUnsub=snap(
    q(col(db,'live_engagement'),wh('adminId','==',uid),wh('timestamp','>=',filterFrom)),
    s=>{
      s.docChanges().forEach(ch=>{
        if(ch.type==='added'){
          const d=ch.doc.data();
          const tid=(d.tiktokId||'').toLowerCase();
          if(!tid) return;
          _vipScores[tid]=(_vipScores[tid]||0)+(d.points||0);
          // Novi VIP dostignut?
          if(_vipScores[tid]>=VIP_THRESHOLD && !_vipBadges.has(tid)){
            _vipBadges.add(tid);
            if(!_vipNotified.has(tid)){
              _vipNotified.add(tid);
              playVIP();
              const k=_kupci.find(x=>(x.tiktokIme||'').toLowerCase()===tid);
              const ime=k?(k.tiktokNick||k.name||'@'+tid):'@'+tid;
              _showToast('⭐ VIP: '+ime+' ('+Math.round(_vipScores[tid])+' bodova)!', 5000, 'gold');
            }
          }
        }
      });
    },
    e=>{ console.warn('Engagement listener error:', e.message); }
  );
}

// 🔔 Neuer Kunde registriert — freudiger Aufwärts-Akkord
// ⭐ VIP — warmer goldener Fanfare-Ton
function playVIP(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Royaler Fanfare: kurze Einleitung + langer strahlender Akkord
    [[330,0,'sine',0.2],[440,0.1,'sine',0.25],[550,0.2,'sine',0.3],[660,0.3,'triangle',0.4],[880,0.45,'triangle',0.45],[660,0.45,'sine',0.3],[550,0.45,'sine',0.2]].forEach(([freq,t,type,vol])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type=type;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(vol,ctx.currentTime+t+0.06);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+(freq===880||freq===660&&t>0.4?0.6:0.2));
      o.start(ctx.currentTime+t);
      o.stop(ctx.currentTime+t+0.7);
    });
  } catch(e){}
}

function playNeuerKupac(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Aufwärts-Arpeggio: C5 → E5 → G5 → C6 → kurzer Abschluss-Akkord
    [[523,0,'triangle',0.35],[659,0.15,'triangle',0.35],[784,0.30,'triangle',0.35],[1047,0.45,'triangle',0.4],[1047,0.70,'sine',0.25],[784,0.70,'sine',0.25]].forEach(([freq,t,type,vol])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq; o.type=type;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(vol,ctx.currentTime+t+0.04);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+0.22);
      o.start(ctx.currentTime+t);
      o.stop(ctx.currentTime+t+0.25);
    });
  } catch(e){}
}

// 🚫 Blokiran Kunde im Chat — bedrohlicher Abstieg + Buzzer
function playBlokiran(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Absteigende Töne: G4 → E4 → C4 → tief
    [[392,0,'sawtooth',0.3],[330,0.18,'sawtooth',0.3],[262,0.36,'sawtooth',0.3],[196,0.55,'square',0.45]].forEach(([freq,t,type,vol])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq; o.type=type;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(vol,ctx.currentTime+t+0.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+0.28);
      o.start(ctx.currentTime+t);
      o.stop(ctx.currentTime+t+0.32);
    });
    // Kurzer Alarm-Buzz am Ende
    setTimeout(()=>{
      try{
        const ctx2=new(window.AudioContext||window.webkitAudioContext)();
        [0,0.12,0.24].forEach(t=>{
          const o=ctx2.createOscillator(),g=ctx2.createGain();
          o.connect(g);g.connect(ctx2.destination);
          o.frequency.value=180; o.type='square';
          g.gain.setValueAtTime(0,ctx2.currentTime+t);
          g.gain.linearRampToValueAtTime(0.5,ctx2.currentTime+t+0.02);
          g.gain.linearRampToValueAtTime(0,ctx2.currentTime+t+0.10);
          o.start(ctx2.currentTime+t);
          o.stop(ctx2.currentTime+t+0.12);
        });
      } catch(e){}
    },650);
  } catch(e){}
}

// 🎉 Nicht-registrierter Kunde hat sich gerade registriert!
function playRegistrovao(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Fanfare: schnelle Aufwärts-Triole + langer hoher Ton
    [[392,0,'sine',0.3],[523,0.12,'sine',0.35],[659,0.24,'sine',0.35],[784,0.36,'sine',0.4],[1047,0.5,'triangle',0.45]].forEach(([freq,t,type,vol])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq; o.type=type;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(vol,ctx.currentTime+t+0.04);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+(freq===1047?0.5:0.18));
      o.start(ctx.currentTime+t);

}

function startLiveKupciListener(){
  const {collection:col,query:q,where:wh,onSnapshot:snap}=window._fb;
  const db=window._db;
  const poznatiBefore=new Set(_kupci.map(k=>k.id));
  if(_liveKupciUnsub) _liveKupciUnsub();
  _liveKupciUnsub=snap(q(col(db,'users'),wh('role','==','kupac')),s=>{
    s.forEach(d=>{
      const data=d.data();
      if(!poznatiBefore.has(d.id)){
        poznatiBefore.add(d.id);
        if(data.blocked){
          playBlokiran();
          _showToast('🚫 BLOKIRAN se pojavio: '+(data.name||data.tiktokIme||'?'), 6000, 'purple');
        } else {
          const tiktokIme=(data.tiktokIme||'').toLowerCase();
          if(tiktokIme && _seenNoreg.has(tiktokIme)){
            // Bio je crven u chatu — upravo se registrovao!
            playRegistrovao();
            _showToast('🎉 @'+tiktokIme+' se upravo registrovao!', 5000, 'green');
            _seenNoreg.delete(tiktokIme);
          } else {
            playNeuerKupac();
            _showToast('🔔 NOVI KUPAC: '+(data.tiktokNick||data.name||data.tiktokIme||'?')+' se registrovao!', 5000, 'green');
          }
        }
      }
    });
  });
}

function playKlingel(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
      g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.18+0.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.18+0.25);
      o.start(ctx.currentTime+i*0.18);
      o.stop(ctx.currentTime+i*0.18+0.3);
    });
  } catch(e){}
}

// ── LIVE CHAT FEED ──
function startLiveChatFeed(){
  const {collection:col,query:q,where:wh,onSnapshot:snap,limit:lim}=window._fb;
  const db=window._db, uid=window._uid;
  const feed=document.getElementById('chat-col');
  feed.innerHTML='<div style="text-align:center;color:var(--txt3);font-size:13px;padding:40px;">⏳ Povezujem se...</div>';
  const filterFrom=new Date((_liveStartedAt||new Date()).getTime()-5000);
  let _init=false, _seen=new Set(), _localDocs=[], _newCnt=0;

  const chatQ=q(col(db,'live_chat'),wh('adminId','==',uid),wh('timestamp','>=',filterFrom),lim(300));
  _liveChatUnsub=snap(chatQ, snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'&&!_seen.has(ch.doc.id)){
        _seen.add(ch.doc.id);
        const d={id:ch.doc.id,...ch.doc.data()};
        _localDocs.unshift(d);
        if(_init){
          _newCnt++;
          const tId=(d.tiktokId||'').toLowerCase();
          const kCheck=_kupci.find(x=>(x.tiktokIme||'').toLowerCase()===tId);
          if(kCheck?.blocked){
            playBlokiran();
            _showToast('🚫 BLOKIRAN piše u chatu: @'+tId, 6000, 'purple');
          } else if(!kCheck){
            // Nije registrovan — zapamti ga
            if(tId) _seenNoreg.add(tId);
          }
        }
      } else if(ch.type==='modified'){
        const idx=_localDocs.findIndex(x=>x.id===ch.doc.id);
        if(idx!==-1) _localDocs[idx]={id:ch.doc.id,...ch.doc.data()};
      }
    });
    if(!_init) _init=true;
    _chatCnt=_newCnt||_localDocs.length;
    document.getElementById('s-c').textContent=_chatCnt;
    document.getElementById('csdot').style.cssText='width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;margin-left:auto;';
    document.getElementById('cstxt').textContent='Aktivan';
    renderChatFeed(_localDocs);
    _fsOk('live chat aktivan');
  }, err=>{
    console.error('Chat error:',err.message);
    feed.innerHTML='<div style="color:#fda4af;font-size:12px;padding:16px;">❌ Greška: '+err.message+'</div>';
  });
}

function renderChatFeed(docs){
  const feed=document.getElementById('chat-col');
  if(!docs.length){
    feed.innerHTML='<div style="text-align:center;color:var(--txt3);font-size:13px;padding:40px;">Čekam komentare...</div>';
    return;
  }

  // Lokalna detekcija statusa po tiktokIme
  function getLocalStatus(tiktokId){
    if(!tiktokId) return 'noreg';
    const k=_kupci.find(x=>(x.tiktokIme||'').toLowerCase()===tiktokId.toLowerCase());
    if(!k) return 'noreg';
    if(k.blocked) return 'blocked';
    const r=_racuni.filter(x=>x.kupacId===k.id&&!x.adminDeleted);
    if(!r.length) return 'noreg';
    const today=new Date(); today.setHours(0,0,0,0);
    const kasni=r.some(x=>{
      if(x.status!=='novo'||!x.datum) return false;
      const d=new Date(x.datum); d.setHours(0,0,0,0);
      return Math.round((today-d)/(1000*60*60*24))>=3;
    });
    if(kasni) return 'kasni';
    return 'reg';
  }

  feed.innerHTML=docs.map(d=>{
    const tiktokId=(d.tiktokId||'').toLowerCase();
    let s;
    if(d.statusColor==='green')       s='reg';
    else if(d.statusColor==='orange') s='kasni';
    else if(d.statusColor==='red')    s='noreg';
    else s=getLocalStatus(tiktokId);

    // Blocked uvek override — lokalna provjera
    const kLocal=_kupci.find(x=>(x.tiktokIme||'').toLowerCase()===tiktokId);
    if(kLocal?.blocked) s='blocked';

    const c  = s==='reg'?'#4ade80':s==='kasni'?'#fb923c':s==='noreg'?'#f87171':s==='blocked'?'#c084fc':'#94a3b8';
    const bg = s==='reg'?'rgba(74,222,128,0.07)':s==='kasni'?'rgba(251,146,60,0.07)':s==='noreg'?'rgba(248,113,113,0.06)':s==='blocked'?'rgba(192,132,252,0.08)':'rgba(148,163,184,0.04)';
    const t   = d.timestamp?.toDate?d.timestamp.toDate():new Date(d.timestamp||Date.now());
    const ts  = t.toLocaleTimeString('sr-Latn',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const k   = _kupci.find(x=>(x.tiktokIme||'').toLowerCase()===tiktokId);
    const nick= k?(k.tiktokNick||k.name||''):tiktokId;
    const isVip = _vipBadges.has(tiktokId);
    const blockedBadge = s==='blocked'
      ? '<span style="font-size:11px;background:rgba(192,132,252,0.15);color:#c084fc;border:1px solid rgba(192,132,252,0.3);border-radius:99px;padding:1px 8px;font-weight:700;margin-left:4px;">🚫 Blokiran</span>'
      : '';
    const vipBadge = isVip
      ? '<span style="font-size:11px;background:rgba(250,204,21,0.18);color:#fbbf24;border:1px solid rgba(250,204,21,0.4);border-radius:99px;padding:1px 8px;font-weight:800;margin-left:4px;">⭐ VIP</span>'
      : '';
    const cardBorder = isVip ? '4px solid rgba(250,204,21,0.55)' : `4px solid ${c}`;
    const cardBg     = isVip ? `linear-gradient(135deg,${bg},rgba(250,204,21,0.05))` : bg;
    const nameColor  = isVip ? '#fbbf24' : c;

    return `<div style="padding:12px 16px;border-radius:12px;background:${cardBg};border-left:${cardBorder};animation:sli 0.3s ease;margin-bottom:2px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
        <div style="display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;flex-wrap:wrap;">
          <span style="font-size:22px;font-weight:900;color:${nameColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.3px;">${isVip?'⭐ ':''} ${nick}</span>
          <span style="font-size:12px;color:rgba(255,255,255,0.3);white-space:nowrap;">@${tiktokId}</span>
          ${blockedBadge}${vipBadge}
        </div>
        <span style="font-size:10px;color:var(--txt3);white-space:nowrap;margin-left:10px;flex-shrink:0;">${ts}</span>
      </div>
      <div style="font-size:16px;color:rgba(255,255,255,0.85);line-height:1.45;">${d.comment||''}</div>
    </div>`;
  }).join('');
}
